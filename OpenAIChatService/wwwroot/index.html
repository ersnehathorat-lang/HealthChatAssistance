<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Chat Assistant</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

            button:hover {
                background: #005fa3;
            }

        .response-box {
            margin-top: 20px;
            padding: 15px;
            background: #eef6ff;
            border-left: 4px solid #0078d4;
            border-radius: 6px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Healthcare AI Assistant</h2>

        <textarea id="userInput" placeholder="Ask a health-related question..."></textarea>

        <button onclick="sendMessage()">Ask</button>

        <div id="response" class="response-box" style="display:none;"></div>
    </div>

    <script>
        async function sendMessage() {
            const prompt = document.getElementById("userInput").value;
            const responseBox = document.getElementById("response");

            if (!prompt.trim()) {
                alert("Please enter a question.");
                return;
            }

            responseBox.style.display = "block";
            responseBox.innerHTML = "Thinking...";

            try {
                const res = await fetch("https://localhost:7025/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                const data = await res.json();
                responseBox.innerHTML = data.answer;
            } catch (error) {
                responseBox.innerHTML = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
